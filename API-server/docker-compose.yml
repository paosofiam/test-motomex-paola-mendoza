services:
  api:
    build: .
    environment:
      # La base de datos se define en las VARIABLES DE ENTORNO de Coolify
      # (recurso "api" -> Environment Variables). El valor NO se escribe aquí:
      # Coolify lo inyecta vía ${DATABASE_URL} para apuntar a tu MySQL de Hostinger
      # (el que administras por phpMyAdmin). Si esta variable no está definida en
      # Coolify, la app arranca sin base y falla: definirla es obligatorio.
      DATABASE_URL: ${DATABASE_URL}
      APP_NAME: Motomex API
    #ports:
      #- "8000:8000"
    expose:
      - "8000"

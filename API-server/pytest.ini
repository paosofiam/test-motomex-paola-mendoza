[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra
# Silencia SOLO el aviso de Starlette 1.2.x que prefiere `httpx2` sobre el `httpx` 0.x
# clasico usado por FastAPI TestClient. Filtro acotado por mensaje + categoria exacta
# (no un ignore global) para no ocultar otros DeprecationWarning. No instalamos httpx2
# (paquete nuevo: minima superficie de dependencias). Quitar esta linea el dia que se
# audite e incorpore httpx2 como dependencia de pruebas.
filterwarnings =
    ignore:Using `httpx` with `starlette\.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning
